<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Renderless AI Wireframe MVP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="logo">Renderless</div>
        <nav class="tabs" id="tabs"></nav>
        <div class="topbar-actions">
          <div class="live-status"><span class="dot"></span>Live Connected</div>
          <button id="streamButton" class="danger-btn">Push to Stream</button>
        </div>
      </header>
      <main id="viewContainer" class="view-container"></main>
    </div>
    <script src="app.js"></script>
  </body>
</html>
